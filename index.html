<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .styleSet7 {
            background-color: red;
            color: white;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <p id="text">text</p>
    <p class="text1">text1</p>
    <script>
        const e1 = document.querySelector("#text")
        e1.style.color = 'white';
        e1.style.backgroundColor = 'blue';
        e1.style.fontSize = '35px';

        const e2 = document.querySelector('.text1');
        e2.classList.add('styleSet7')
    </script>
</body>
</html>
